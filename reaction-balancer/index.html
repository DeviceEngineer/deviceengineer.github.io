<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Equation Balancing Game - Start</title>
<style>
    /* --- Your Original Styling --- */
    body {
        font-family: Arial, sans-serif;
        margin: 40px;
        text-align: center;
    }

    h1 {
        font-size: 42px;
        margin-bottom: 30px;
    }

    .container {
        display: inline-block;
        text-align: left;
        padding: 20px;
        border: 1px solid #ccc;
        border-radius: 10px;
    }

    .section {
        margin-bottom: 20px;
        padding: 10px; /* Added small padding for the error border */
        border-radius: 5px;
    }

    label {
        display: block;
        margin: 5px 0;
    }

    input[type="number"] {
        width: 80px;
        padding: 5px;
        font-size: 16px;
    }

    button {
        margin-top: 20px;
        padding: 10px 20px;
        font-size: 18px;
        cursor: pointer;
    }

    /* --- New Feedback Styling --- */
    .error-text {
        color: #d93025;
        font-size: 14px;
        font-weight: bold;
        display: none;
        margin-top: 8px;
    }

    .invalid-section {
        border: 1px solid #d93025;
        background-color: #fff4f4;
    }
</style>
</head>
<body>

<h1>Equation Balancing Game</h1>

<form action="game.html" method="GET" id="setup-form">
    <div class="container">

        <div id="difficulty-group" class="section">
            <strong>Select Difficulty:</strong>
            <label><input type="checkbox" name="difficulty" value="1" class="diff-check"> Easy</label>
            <label><input type="checkbox" name="difficulty" value="2" class="diff-check"> Medium</label>
            <label><input type="checkbox" name="difficulty" value="3" class="diff-check"> Hard</label>
            <div id="error-msg" class="error-text">⚠️ Please select at least one difficulty!</div>
        </div>

        <div class="section">
            <strong>Number of Problems:</strong><br>
            <input type="number" name="problems" min="1" max="100" value="10" required>
        </div>

        <button type="submit">Start Game</button>
    </div>
</form>

<script>
    const form = document.getElementById('setup-form');
    const checkboxes = document.querySelectorAll('.diff-check');
    const errorMsg = document.getElementById('error-msg');
    const diffGroup = document.getElementById('difficulty-group');

    form.addEventListener('submit', function(e) {
        // Validation: Is at least one checked?
        const isOneChecked = Array.from(checkboxes).some(cb => cb.checked);

        if (!isOneChecked) {
            e.preventDefault(); // Stop form submission
            errorMsg.style.display = 'block';
            diffGroup.classList.add('invalid-section');
        }
    });

    // Clear the error styling as soon as the user checks a box
    checkboxes.forEach(cb => {
        cb.addEventListener('change', () => {
            if (Array.from(checkboxes).some(c => c.checked)) {
                errorMsg.style.display = 'none';
                diffGroup.classList.remove('invalid-section');
            }
        });
    });
</script>

</body>
</html>
